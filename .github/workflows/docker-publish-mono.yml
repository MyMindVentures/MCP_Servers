# Build and push all MCP server images to GitHub Container Registry (ghcr.io).
# Each server is built from its own directory and pushed as a separate image
# with both :latest and :<version> tags, where <version> comes from the
# server's package.json.

name: Docker build and push (monorepo)

on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server: [notion, outlook, raindrop, clickup, gammaai, 1password, github, airtable]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set server directory and version
        id: meta
        run: |
          case "${{ matrix.server }}" in
            notion)   DIR="MCP_Server_Notion" ;;
            outlook)  DIR="MCP_Server_Outlook" ;;
            raindrop) DIR="MCP_Server_Raindrop" ;;
            clickup)  DIR="MCP_Server_ClickUp" ;;
            gammaai)  DIR="MCP_Server_GammaAI" ;;
            1password) DIR="MCP_Server_1Password" ;;
            github)   DIR="MCP_Server_GitHub" ;;
            airtable) DIR="MCP_Server_Airtable" ;;
            *) echo "Unknown server"; exit 1 ;;
          esac
          echo "directory=${DIR}" >> $GITHUB_OUTPUT
          VERSION=$(node -p "require('./${DIR}/package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building ${DIR} version ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.meta.outputs.directory }}
          file: ${{ steps.meta.outputs.directory }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/mymindventures/mcp-server-${{ matrix.server }}:latest
            ghcr.io/mymindventures/mcp-server-${{ matrix.server }}:${{ steps.meta.outputs.version }}
            ghcr.io/mymindventures/mcp-server-${{ matrix.server }}:sha-${{ github.sha }}
          build-args: |
            IMAGE_VERSION=${{ steps.meta.outputs.version }}
            IMAGE_SOURCE=https://github.com/${{ github.repository }}
            IMAGE_REVISION=${{ github.sha }}
            IMAGE_VENDOR=${{ github.repository_owner }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
