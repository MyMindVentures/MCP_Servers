# Build and push all three MCP server images (Notion, Outlook, Raindrop) to Docker Hub.
# Each server is built from its own directory and pushed as a separate image.
#
# Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN (Docker Hub).
# For GHCR: use separate GitHub repos per server, each with its own docker-publish.yml in the server folder.

name: Docker build and push (monorepo)

on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server: [notion, outlook, raindrop, clickup, gammaai, 1password, github]

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set server directory and version
        id: meta
        run: |
          case "${{ matrix.server }}" in
            notion)   DIR="MCP_Server_Notion" ;;
            outlook)  DIR="MCP_Server_Outlook" ;;
            raindrop) DIR="MCP_Server_Raindrop" ;;
            clickup)  DIR="MCP_Server_ClickUp" ;;
            gammaai)  DIR="MCP_Server_GammaAI" ;;
            1password) DIR="MCP_Server_1Password" ;;
            github)   DIR="MCP_Server_GitHub" ;;
            *) echo "Unknown server"; exit 1 ;;
          esac
          echo "directory=${DIR}" >> $GITHUB_OUTPUT
          VERSION=$(node -p "require('./${DIR}/package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building ${DIR} version ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.meta.outputs.directory }}
          file: ${{ steps.meta.outputs.directory }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mcp-server-${{ matrix.server }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mcp-server-${{ matrix.server }}:${{ steps.meta.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/mcp-server-${{ matrix.server }}:sha-${{ github.sha }}
          build-args: |
            IMAGE_VERSION=${{ steps.meta.outputs.version }}
            IMAGE_SOURCE=https://github.com/${{ github.repository }}
            IMAGE_REVISION=${{ github.sha }}
            IMAGE_VENDOR=${{ github.repository_owner }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
