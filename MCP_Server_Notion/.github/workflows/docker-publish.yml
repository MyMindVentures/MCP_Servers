# Build and push the MCP server image to GitHub Container Registry (ghcr.io).
# The image will be available as ghcr.io/<owner>/<repo>:latest and ghcr.io/<owner>/<repo>:<version>.
#
# Requirements:
# - Repository setting: Settings → Actions → General → Workflow permissions: "Read and write"
# - No extra secrets needed; GITHUB_TOKEN is used for ghcr.io push.

name: Docker build and push to GHCR

on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=sha-{{sha}},enable=${{ github.event_name == 'push' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            IMAGE_VERSION=${{ steps.version.outputs.version }}
            IMAGE_SOURCE=https://github.com/${{ github.repository }}
            IMAGE_REVISION=${{ github.sha }}
            IMAGE_VENDOR=${{ github.repository_owner }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
